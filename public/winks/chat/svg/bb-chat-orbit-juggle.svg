<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="768" height="1024" viewBox="0 0 768 1024" preserveAspectRatio="xMidYMid meet" data-wink-name="Bingo Ball Orbit Juggle" data-wink-category="Bouncing Bingo Balls" data-wink-duration="3400ms" aria-label="Bingo Ball Orbit Juggle">
  <!-- concept: Orbital juggling loop | motion: Four balls orbit on an ellipse while the center pulses | final: The ring locks with a bright center badge -->
  <style>
  text { font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; paint-order: stroke fill; }
  @keyframes popIn {
    0%, 100% { opacity: 0; transform: translate(var(--fx, 0px), var(--fy, 40px)) scale(0.28) rotate(var(--fr, -16deg)); }
    16% { opacity: 1; }
    34% { opacity: 1; transform: translate(0px, 0px) scale(1.08) rotate(0deg); }
    72% { opacity: 1; transform: translate(0px, 0px) scale(1) rotate(0deg); }
    88% { opacity: 1; }
  }
  @keyframes riseIn {
    0%, 100% { opacity: 0; transform: translate(0px, 140px) scale(0.42); }
    18% { opacity: 1; }
    34% { opacity: 1; transform: translate(0px, -10px) scale(1.05); }
    82% { opacity: 1; transform: translate(0px, 0px) scale(1); }
  }
  @keyframes spinIn {
    0%, 100% { opacity: 0; transform: rotate(-220deg) scale(0.2); }
    18% { opacity: 1; }
    36% { opacity: 1; transform: rotate(10deg) scale(1.06); }
    82% { opacity: 1; transform: rotate(0deg) scale(1); }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0px) rotate(-1deg); }
    50% { transform: translateY(-14px) rotate(1.5deg); }
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-4deg) translateY(0px); }
    50% { transform: rotate(4deg) translateY(-8px); }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.2) rotate(0deg); }
    50% { opacity: 1; transform: scale(1) rotate(14deg); }
  }
  @keyframes burstOut {
    0%, 100% { opacity: 0; transform: translate(0px,0px) scale(0.18); }
    18% { opacity: 1; }
    58% { opacity: 1; transform: translate(var(--tx,0px), var(--ty,0px)) scale(1); }
    82% { opacity: 0; transform: translate(var(--tx,0px), var(--ty,0px)) scale(0.78); }
  }
  @keyframes fallDown {
    0%, 100% { opacity: 0; transform: translate(0px, -120px) rotate(var(--r0, 0deg)) scale(0.52); }
    16% { opacity: 1; }
    84% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--tx, 0px), var(--ty, 560px)) rotate(var(--r1, 200deg)) scale(1); }
  }
  @keyframes drawLine {
    0%, 100% { opacity: 0; stroke-dashoffset: var(--dash, 1200); }
    18% { opacity: 1; }
    42%, 84% { opacity: 1; stroke-dashoffset: 0; }
  }
  @keyframes orbitSpin {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(180deg); }
  }
  @keyframes revealFinal {
    0%, 54%, 100% { opacity: 0; transform: scale(0.38); }
    66% { opacity: 1; transform: scale(1.08); }
    84% { opacity: 1; transform: scale(1); }
  }
</style>
  
        <g style="transform-origin:384px 512px; animation:orbitSpin 3.4s linear infinite;">
          <g style="transform-origin:384px 298px; animation:bob 1.3s ease-in-out infinite 0s;">
  <g>
    <ellipse cx="384" cy="346.3" rx="31.92" ry="10.08" fill="rgba(0,0,0,0.18)" />
    <circle cx="384" cy="298" r="42" fill="#ffe36a" stroke="#173764" stroke-width="5.04" />
    <circle cx="376.44" cy="288.76" r="7.56" fill="#fff" opacity="0.38" />
    <text x="384" y="300.1" text-anchor="middle" dominant-baseline="central" font-size="37.800000000000004" font-weight="900" fill="#173764" stroke="rgba(255,255,255,0.55)" stroke-width="2" letter-spacing="0">B</text>
  </g></g><g style="transform-origin:540px 512px; animation:bob 1.38s ease-in-out infinite 0.08s;">
  <g>
    <ellipse cx="540" cy="560.3" rx="31.92" ry="10.08" fill="rgba(0,0,0,0.18)" />
    <circle cx="540" cy="512" r="42" fill="#74d9ff" stroke="#173764" stroke-width="5.04" />
    <circle cx="532.44" cy="502.76" r="7.56" fill="#fff" opacity="0.38" />
    <text x="540" y="514.1" text-anchor="middle" dominant-baseline="central" font-size="37.800000000000004" font-weight="900" fill="#173764" stroke="rgba(255,255,255,0.55)" stroke-width="2" letter-spacing="0">I</text>
  </g></g><g style="transform-origin:384px 726px; animation:bob 1.46s ease-in-out infinite 0.16s;">
  <g>
    <ellipse cx="384" cy="774.3" rx="31.92" ry="10.08" fill="rgba(0,0,0,0.18)" />
    <circle cx="384" cy="726" r="42" fill="#ff8d86" stroke="#173764" stroke-width="5.04" />
    <circle cx="376.44" cy="716.76" r="7.56" fill="#fff" opacity="0.38" />
    <text x="384" y="728.1" text-anchor="middle" dominant-baseline="central" font-size="37.800000000000004" font-weight="900" fill="#173764" stroke="rgba(255,255,255,0.55)" stroke-width="2" letter-spacing="0">N</text>
  </g></g><g style="transform-origin:228px 512px; animation:bob 1.54s ease-in-out infinite 0.24s;">
  <g>
    <ellipse cx="228" cy="560.3" rx="31.92" ry="10.08" fill="rgba(0,0,0,0.18)" />
    <circle cx="228" cy="512" r="42" fill="#8ef0c9" stroke="#173764" stroke-width="5.04" />
    <circle cx="220.44" cy="502.76" r="7.56" fill="#fff" opacity="0.38" />
    <text x="228" y="514.1" text-anchor="middle" dominant-baseline="central" font-size="37.800000000000004" font-weight="900" fill="#173764" stroke="rgba(255,255,255,0.55)" stroke-width="2" letter-spacing="0">G</text>
  </g></g>
        </g>
        <circle cx="384" cy="512" r="192" fill="none" stroke="#69d9ff" stroke-width="8" opacity="0.22" />
        <g style="transform-origin:384px 512px; animation:revealFinal 3.4s ease-out infinite;">
  <g>
    <rect x="267" y="483" width="234" height="58" rx="29" fill="#173764" stroke="#ffd95f" stroke-width="4.64" />
    <text x="384" y="513.74" text-anchor="middle" dominant-baseline="central" font-size="25.52" font-weight="900" fill="#fff4d8" stroke="#ffd95f" stroke-width="2" letter-spacing="0.7656" >JUGGLE</text>
  </g></g>
      
</svg>
