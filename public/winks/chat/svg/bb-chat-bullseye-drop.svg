<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="768" height="1024" viewBox="0 0 768 1024" preserveAspectRatio="xMidYMid meet" data-wink-name="Bingo Ball Bullseye Drop" data-wink-category="Bouncing Bingo Balls" data-wink-duration="3100ms" aria-label="Bingo Ball Bullseye Drop">
  <style>
    text { font-family: 'Arial Black', 'Trebuchet MS', 'Segoe UI', sans-serif; paint-order: stroke fill; }
    @keyframes dropIn {
      0%, 100% { opacity: 0; transform: translate(var(--fx, 0px), var(--fy, -220px)) scale(0.28) rotate(var(--fr, -14deg)); }
      18% { opacity: 1; }
      38% { opacity: 1; transform: translate(0px, 0px) scale(1.08) rotate(0deg); }
      80% { opacity: 1; transform: translate(0px, 0px) scale(1); }
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.22; transform: scale(0.88); }
      50% { opacity: 0.5; transform: scale(1.06); }
    }
  </style>
  <g style="transform-origin:384px 600px; animation:twinkle 3.1s ease-in-out infinite;">
    <circle cx="384" cy="600" r="164" fill="none" stroke="#0278df" stroke-width="16" opacity="0.18" />
    <circle cx="384" cy="600" r="118" fill="none" stroke="#9610b8" stroke-width="14" opacity="0.22" />
    <circle cx="384" cy="600" r="72" fill="none" stroke="#f7c901" stroke-width="12" opacity="0.26" />
  </g>
  <g style="transform-origin:144px 564px; --fx:0px; --fy:-280px; --fr:-16deg; animation:dropIn 3.1s cubic-bezier(0.2,0.9,0.24,1) infinite;">
    <g transform="translate(144 564)">
      <ellipse cx="0" cy="42" rx="23" ry="7.2" fill="rgba(0,0,0,0.18)" />
      <circle cx="0" cy="0" r="30" fill="#0278df" stroke="#015cab" stroke-width="3.6" />
      <circle cx="0" cy="0" r="26.4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.3" />
      <circle cx="0" cy="0" r="18.4" fill="#ffffff" stroke="#015cab" stroke-width="1.8" />
      <text x="0" y="1.2" text-anchor="middle" dominant-baseline="central" font-size="28" font-weight="900" fill="#0278df" stroke="#015cab" stroke-width="1.7" letter-spacing="0">B</text>
      <ellipse cx="-11" cy="-15" rx="10" ry="5" fill="#ffffff" opacity="0.5" />
    </g>
  </g>
  <g style="transform-origin:264px 564px; --fx:0px; --fy:-240px; --fr:-10deg; animation:dropIn 3.1s cubic-bezier(0.2,0.9,0.24,1) infinite; animation-delay:0.08s;">
