  <g>
    <ellipse cx="476" cy="605.2" rx="36.480000000000004" ry="11.52" fill="rgba(0,0,0,0.18)" />
    <circle cx="476" cy="550" r="48" fill="#ff8d86" stroke="#173764" stroke-width="5.76" />
    <circle cx="467.36" cy="539.44" r="8.64" fill="#fff" opacity="0.38" />
    <text x="476" y="552.4" text-anchor="middle" dominant-baseline="central" font-size="43.2" font-weight="900" fill="#173764" stroke="rgba(255,255,255,0.55)" stroke-width="2.16" letter-spacing="0">G</text>
  </g></g>
      <g style="transform-origin:384px 696px; animation:revealFinal 3.1s ease-out infinite;">
  <g>
    <rect x="234" y="665" width="300" height="62" rx="31" fill="#173764" stroke="#ffd95f" stroke-width="4.96" />
    <text x="384" y="697.86" text-anchor="middle" dominant-baseline="central" font-size="27.28" font-weight="900" fill="#fff4d8" stroke="#ffd95f" stroke-width="2" letter-spacing="0.8184" >BULLSEYE</text>
  </g></g>
    
</svg>
