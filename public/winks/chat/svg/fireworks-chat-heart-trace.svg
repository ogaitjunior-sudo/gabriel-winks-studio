<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="768" height="1024" viewBox="0 0 768 1024" preserveAspectRatio="xMidYMid meet" data-wink-name="Fireworks Heart Trace" data-wink-category="Fireworks" data-wink-duration="3400ms" aria-label="Fireworks Heart Trace">
  <!-- concept: Heart-outline firework drawing | motion: Twin rocket trails loop into a glowing heart | final: The heart holds as a sparkling emblem -->
  <style>
  text { font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; paint-order: stroke fill; }
  @keyframes popIn {
    0%, 100% { opacity: 0; transform: translate(var(--fx, 0px), var(--fy, 40px)) scale(0.28) rotate(var(--fr, -16deg)); }
    16% { opacity: 1; }
    34% { opacity: 1; transform: translate(0px, 0px) scale(1.08) rotate(0deg); }
    72% { opacity: 1; transform: translate(0px, 0px) scale(1) rotate(0deg); }
    88% { opacity: 1; }
  }
  @keyframes riseIn {
    0%, 100% { opacity: 0; transform: translate(0px, 140px) scale(0.42); }
    18% { opacity: 1; }
    34% { opacity: 1; transform: translate(0px, -10px) scale(1.05); }
    82% { opacity: 1; transform: translate(0px, 0px) scale(1); }
  }
  @keyframes spinIn {
    0%, 100% { opacity: 0; transform: rotate(-220deg) scale(0.2); }
    18% { opacity: 1; }
    36% { opacity: 1; transform: rotate(10deg) scale(1.06); }
    82% { opacity: 1; transform: rotate(0deg) scale(1); }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0px) rotate(-1deg); }
    50% { transform: translateY(-14px) rotate(1.5deg); }
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-4deg) translateY(0px); }
    50% { transform: rotate(4deg) translateY(-8px); }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.2) rotate(0deg); }
    50% { opacity: 1; transform: scale(1) rotate(14deg); }
  }
  @keyframes burstOut {
    0%, 100% { opacity: 0; transform: translate(0px,0px) scale(0.18); }
    18% { opacity: 1; }
    58% { opacity: 1; transform: translate(var(--tx,0px), var(--ty,0px)) scale(1); }
    82% { opacity: 0; transform: translate(var(--tx,0px), var(--ty,0px)) scale(0.78); }
  }
  @keyframes fallDown {
    0%, 100% { opacity: 0; transform: translate(0px, -120px) rotate(var(--r0, 0deg)) scale(0.52); }
    16% { opacity: 1; }
    84% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--tx, 0px), var(--ty, 560px)) rotate(var(--r1, 200deg)) scale(1); }
  }
  @keyframes drawLine {
    0%, 100% { opacity: 0; stroke-dashoffset: var(--dash, 1200); }
    18% { opacity: 1; }
    42%, 84% { opacity: 1; stroke-dashoffset: 0; }
  }
  @keyframes orbitSpin {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(180deg); }
  }
  @keyframes revealFinal {
    0%, 54%, 100% { opacity: 0; transform: scale(0.38); }
    66% { opacity: 1; transform: scale(1.08); }
    84% { opacity: 1; transform: scale(1); }
  }
</style>
  
      <path d="M 384 818 C 474 760, 564 678, 564 578 C 564 496, 508 430, 430 430 C 392 430, 360 450, 384 486 C 408 450, 376 430, 338 430 C 260 430, 204 496, 204 578 C 204 678, 294 760, 384 818 Z" fill="none" stroke="#ff8da8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="1380" style="--dash:1380; animation:drawLine 3.4s ease-in-out infinite;" />
      <g style="transform-origin:384px 512px; animation:revealFinal 3.4s ease-out infinite;"><polygon points="384,508 394.69,533.31 420,544 394.69,554.69 384,580 373.31,554.69 348,544 373.31,533.31" fill="#ffe36a" stroke="rgba(255,255,255,0.72)" stroke-width="2.88" /><polygon points="268,458 273.94,472.06 288,478 273.94,483.94 268,498 262.06,483.94 248,478 262.06,472.06" fill="#74d9ff" stroke="rgba(255,255,255,0.72)" stroke-width="1.6" /><polygon points="500,458 505.94,472.06 520,478 505.94,483.94 500,498 494.06,483.94 480,478 494.06,472.06" fill="#8ef0c9" stroke="rgba(255,255,255,0.72)" stroke-width="1.6" /></g>
    
</svg>
