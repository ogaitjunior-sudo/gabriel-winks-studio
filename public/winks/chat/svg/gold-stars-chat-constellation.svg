m-origin:232px 452px; animation:twinkle 1.36s ease-in-out infinite 0.48s;"><polygon points="232,434 237.35,446.65 250,452 237.35,457.35 232,470 226.65,457.35 214,452 226.65,446.65" fill="#ffe36a" stroke="rgba(255,255,255,0.72)" stroke-width="1.44"/></g><g style="transform-origin:384px 512px; animation:revealFinal 3.2s ease-out infinite;">
  <g>
    <rect x="218" y="656" width="332" height="56" rx="28" fill="#173764" stroke="#ffe36a" stroke-width="4.48"/>
    <text x="384" y="685.68" text-anchor="middle" dominant-baseline="central" font-size="24.64" font-weight="900" fill="#fff4d8" stroke="#ffe36a" stroke-width="2" letter-spacing="0.7392">CONSTELLATION</text>
  </g></g></g></svg>
