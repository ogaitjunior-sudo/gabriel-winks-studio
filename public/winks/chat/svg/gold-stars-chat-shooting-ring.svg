<svg xmlns="http://www.w3.org/2000/svg" width="768" height="1024" viewBox="0 0 768 1024" preserveAspectRatio="xMidYMid meet" data-wink-name="Gold Star Shooting Ring" data-wink-category="Gold Stars" data-wink-duration="3300ms" aria-label="Gold Star Shooting Ring"><defs><linearGradient x1="0" x2="0" y1="0" y2="1" data-wink-edge-fade="true" id="wink-edge-fade-mask-top"><stop offset="0%" stop-color="#000"/><stop offset="100%" stop-color="#fff"/></linearGradient><linearGradient x1="0" x2="0" y1="0" y2="1" data-wink-edge-fade="true" id="wink-edge-fade-mask-bottom"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#000"/></linearGradient><linearGradient x1="0" x2="1" y1="0" y2="0" data-wink-edge-fade="true" id="wink-edge-fade-mask-left"><stop offset="0%" stop-color="#000"/><stop offset="100%" stop-color="#fff"/></linearGradient><linearGradient x1="0" x2="1" y1="0" y2="0" data-wink-edge-fade="true" id="wink-edge-fade-mask-right"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#000"/></linearGradient><radialGradient cx="100%" cy="100%" r="100%" data-wink-edge-fade="true" id="wink-edge-fade-mask-top-left"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#000"/></radialGradient><radialGradient cx="0%" cy="100%" r="100%" data-wink-edge-fade="true" id="wink-edge-fade-mask-top-right"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#000"/></radialGradient><radialGradient cx="100%" cy="0%" r="100%" data-wink-edge-fade="true" id="wink-edge-fade-mask-bottom-left"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#000"/></radialGradient><radialGradient cx="0%" cy="0%" r="100%" data-wink-edge-fade="true" id="wink-edge-fade-mask-bottom-right"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#000"/></radialGradient><mask data-wink-edge-fade="true" height="1024" id="wink-edge-fade-mask" maskContentUnits="userSpaceOnUse" maskUnits="userSpaceOnUse" mask-type="alpha" width="768" x="0" y="0"><rect fill="#000" height="1024" width="768" x="0" y="0"/><rect fill="#fff" height="819.2" width="614.4" x="76.80000000000001" y="102.4"/><rect fill="url(#wink-edge-fade-mask-top)" height="102.4" width="614.4" x="76.80000000000001" y="0"/><rect fill="url(#wink-edge-fade-mask-bottom)" height="102.4" width="614.4" x="76.80000000000001" y="921.6"/><rect fill="url(#wink-edge-fade-mask-left)" height="819.2" width="76.80000000000001" x="0" y="102.4"/><rect fill="url(#wink-edge-fade-mask-right)" height="819.2" width="76.80000000000001" x="691.2" y="102.4"/><rect fill="url(#wink-edge-fade-mask-top-left)" height="102.4" width="76.80000000000001" x="0" y="0"/><rect fill="url(#wink-edge-fade-mask-top-right)" height="102.4" width="76.80000000000001" x="691.2" y="0"/><rect fill="url(#wink-edge-fade-mask-bottom-left)" height="102.4" width="76.80000000000001" x="0" y="921.6"/><rect fill="url(#wink-edge-fade-mask-bottom-right)" height="102.4" width="76.80000000000001" x="691.2" y="921.6"/></mask></defs>
  <!-- concept: Meteor ring sweep | motion: Shooting stars race around a circle and leave a glowing ring | final: A star halo closes around center -->
  <style>
  text { font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; paint-order: stroke fill; }
  @keyframes popIn {
    0%, 100% { opacity: 0; transform: translate(var(--fx, 0px), var(--fy, 40px)) scale(0.28) rotate(var(--fr, -16deg)); }
    16% { opacity: 1; }
    34% { opacity: 1; transform: translate(0px, 0px) scale(1.08) rotate(0deg); }
    72% { opacity: 1; transform: translate(0px, 0px) scale(1) rotate(0deg); }
    88% { opacity: 1; }
  }
  @keyframes riseIn {
    0%, 100% { opacity: 0; transform: translate(0px, 140px) scale(0.42); }
    18% { opacity: 1; }
    34% { opacity: 1; transform: translate(0px, -10px) scale(1.05); }
    82% { opacity: 1; transform: translate(0px, 0px) scale(1); }
  }
  @keyframes spinIn {
    0%, 100% { opacity: 0; transform: rotate(-220deg) scale(0.2); }
    18% { opacity: 1; }
    36% { opacity: 1; transform: rotate(10deg) scale(1.06); }
    82% { opacity: 1; transform: rotate(0deg) scale(1); }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0px) rotate(-1deg); }
    50% { transform: translateY(-14px) rotate(1.5deg); }
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-4deg) translateY(0px); }
    50% { transform: rotate(4deg) translateY(-8px); }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.2) rotate(0deg); }
    50% { opacity: 1; transform: scale(1) rotate(14deg); }
  }
  @keyframes burstOut {
    0%, 100% { opacity: 0; transform: translate(0px,0px) scale(0.18); }
    18% { opacity: 1; }
    58% { opacity: 1; transform: translate(var(--tx,0px), var(--ty,0px)) scale(1); }
    82% { opacity: 0; transform: translate(var(--tx,0px), var(--ty,0px)) scale(0.78); }
  }
  @keyframes fallDown {
    0%, 100% { opacity: 0; transform: translate(0px, -120px) rotate(var(--r0, 0deg)) scale(0.52); }
    16% { opacity: 1; }
    84% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--tx, 0px), var(--ty, 560px)) rotate(var(--r1, 200deg)) scale(1); }
  }
  @keyframes drawLine {
    0%, 100% { opacity: 0; stroke-dashoffset: var(--dash, 1200); }
    18% { opacity: 1; }
    42%, 84% { opacity: 1; stroke-dashoffset: 0; }
  }
  @keyframes orbitSpin {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(180deg); }
  }
  @keyframes revealFinal {
    0%, 54%, 100% { opacity: 0; transform: scale(0.38); }
    66% { opacity: 1; transform: scale(1.08); }
    84% { opacity: 1; transform: scale(1); }
  }
</style>
  
