 animation:twinkle 1.4s ease-in-out infinite 0.48s;"><polygon points="384,330 388.75,341.25 400,346 388.75,350.75 384,362 379.25,350.75 368,346 379.25,341.25" fill="#ffe36a" stroke="rgba(255,255,255,0.72)" stroke-width="1.28"/></g><g style="transform-origin:501.38px 394.62px; animation:twinkle 1.45s ease-in-out infinite 0.56s;"><polygon points="501.38,378.62 506.13,389.87 517.38,394.62 506.13,399.37 501.38,410.62 496.63,399.37 485.38,394.62 496.63,389.87" fill="#fff4bf" stroke="rgba(255,255,255,0.72)" stroke-width="1.28"/></g><g style="transform-origin:384px 512px; animation:revealFinal 3.3s ease-out infinite;"><polygon points="384,478 394.1,501.9 418,512 394.1,522.1 384,546 373.9,522.1 350,512 373.9,501.9" fill="#ffe36a" stroke="rgba(255,255,255,0.72)" stroke-width="2.72"/></g></g></svg>
