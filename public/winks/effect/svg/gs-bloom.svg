37273,384.8848206480478 L1002.8595242743158,384.47630615354694 Z" fill="hsl(43 94% 60%)" stroke="hsl(48 100% 84%)" stroke-width="1.2"/></g><g><line x1="960" y1="540" x2="1125.0394668524893" y2="475.34362224782797" stroke="hsl(50 100% 92%)" stroke-width="2.4" stroke-linecap="round" opacity="0.84"/><path d="M1125.0394668524893,457.34362224782797 L1129.2715206689952,469.51869988832834 L1142.158484145802,469.7813163490789 L1131.8870737698144,477.56854460732757 L1135.6196013937538,489.905928146577 L1125.0394668524893,482.54362224782795 L1114.459332311225,489.905928146577 L1118.1918599351643,477.56854460732757 L1107.9204495591766,469.7813163490789 L1120.8074130359835,469.51869988832834 Z" fill="hsl(43 94% 60%)" stroke="hsl(48 100% 84%)" stroke-width="1.2"/></g></g></svg>
