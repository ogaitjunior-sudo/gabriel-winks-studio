<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1920" height="1080"><style>@keyframes wink-burst {
  0% { transform: scale(0); opacity: 0; }
  20% { opacity: 1; }
  60% { transform: scale(1); opacity: 1; }
  100% { transform: scale(1.15); opacity: 0; }
}
@keyframes wink-fade-loop {
  0%, 100% { opacity: 0; }
  10%, 70% { opacity: 1; }
}
@keyframes wink-spark-fall {
  0% { transform: translateY(-40px); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(220px); opacity: 0; }
}
@keyframes wink-comet {
  0% { transform: translate(0,0) scale(0.6); opacity: 0; }
  30% { opacity: 1; }
  70% { transform: translate(var(--tx,0), var(--ty,-200px)) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx,0), var(--ty,-200px)) scale(1.2); opacity: 0; }
}
@keyframes wink-ring-expand {
  0% { transform: scale(0.1); opacity: 0; stroke-width: 8; }
  20% { opacity: 1; }
  100% { transform: scale(1); opacity: 0; stroke-width: 1; }
}
@keyframes wink-twinkle {
  0%, 100% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1); opacity: 1; }
}
@keyframes wink-pop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  60% { transform: scale(1.15) rotate(5deg); opacity: 1; }
  80% { transform: scale(1) rotate(0); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 0; }
}
@keyframes wink-swirl {
  0% { transform: rotate(0deg) translateX(180px) scale(0); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: rotate(360deg) translateX(40px) scale(1); opacity: 0; }
}
@keyframes wink-shower {
  0% { transform: translateY(-60px) rotate(0); opacity: 0; }
  15% { opacity: 1; }
  100% { transform: translateY(260px) rotate(180deg); opacity: 0; }
}
@keyframes wink-trail {
  0% { offset-distance: 0%; opacity: 0; transform: scale(0.4); }
  10% { opacity: 1; transform: scale(1); }
  90% { opacity: 1; }
  100% { offset-distance: 100%; opacity: 0; transform: scale(0.6); }
}
@keyframes wink-bounce-in {
  0% { transform: translateY(-300px) scale(0.6); opacity: 0; }
  50% { transform: translateY(20px) scale(1.05); opacity: 1; }
  70% { transform: translateY(-10px) scale(0.98); }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}
@keyframes wink-bounce-loop {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
@keyframes wink-pop-up {
  0% { transform: translateY(300px); opacity: 0; }
  60% { transform: translateY(-15px); opacity: 1; }
  100% { transform: translateY(0); opacity: 1; }
}
@keyframes wink-orbit {
  from { transform: rotate(0deg) translateX(var(--orbit-r,160px)) rotate(0deg); }
  to { transform: rotate(360deg) translateX(var(--orbit-r,160px)) rotate(-360deg); }
}
@keyframes wink-scatter {
  0%, 100% { transform: translate(var(--sx,0), var(--sy,0)) scale(0.9); opacity: 0.6; }
  50% { transform: translate(calc(var(--sx,0) * 1.2), calc(var(--sy,0) * 1.2)) scale(1.05); opacity: 1; }
}
@keyframes wink-sparkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }
}
@keyframes wink-glow-pulse {
  0%, 100% { opacity: 0.4; transform: scale(0.95); }
  50% { opacity: 1; transform: scale(1.05); }
}
@keyframes wink-confetti-launch {
  0% { transform: translate(0,0) rotate(var(--r0,0deg)) scale(0.28); opacity: 0; }
  14% { opacity: 1; }
  72% { transform: translate(var(--tx,0px), var(--ty,0px)) rotate(var(--r1,180deg)) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx,0px), var(--ty,0px)) rotate(var(--r2,320deg)) scale(0.82); opacity: 0; }
}
@keyframes wink-confetti-fall {
  0% { transform: translate(0,-90px) rotate(var(--r0,0deg)) scale(0.7); opacity: 0; }
  14% { opacity: 1; }
  82% { opacity: 1; }
  100% { transform: translate(var(--tx,0px), var(--ty,720px)) rotate(var(--r1,260deg)) scale(1); opacity: 0; }
}
@keyframes wink-confetti-shimmer {
  0%, 100% { transform: rotate(var(--r0,0deg)) scale(0.92); }
  50% { transform: rotate(var(--r1,180deg)) scale(1.08); }
}
@keyframes wink-confetti-wave {
  0% { transform: translate(var(--sx,-180px), var(--sy,0px)) rotate(var(--r0,0deg)) scale(0.5); opacity: 0; }
  18% { opacity: 1; }
  58% { transform: translate(0,0) rotate(var(--r1,180deg)) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx,180px), var(--ty,0px)) rotate(var(--r2,360deg)) scale(0.78); opacity: 0; }
}
@keyframes wink-bingo-arrive {
  0% { transform: translate(var(--from-x,0), var(--from-y,0)) scale(0.34); opacity: 0; }
  18% { opacity: 1; }
  38% { transform: translate(var(--overshoot-x,0), var(--overshoot-y,0)) scale(1.09); opacity: 1; }
  46%, 100% { transform: translate(0,0) scale(1); opacity: 1; }
}
@keyframes wink-bingo-countdown {
  0%, 100% { opacity: 0; transform: scale(0.36); }
  5% { opacity: 1; transform: scale(0.92); }
  10% { opacity: 1; transform: scale(1.06); }
  16% { opacity: 0; transform: scale(1.22); }
}
@keyframes wink-bingo-spiral-letter {
  0% { transform: rotate(var(--spin-start,-220deg)) translateX(var(--orbit-r,320px)) scale(0.3); opacity: 0; }
  22% { opacity: 1; }
  42% { transform: rotate(var(--spin-mid,24deg)) translateX(18px) scale(1.1); opacity: 1; }
  52%, 100% { transform: rotate(0deg) translateX(0) scale(1); opacity: 1; }
}
@keyframes wink-bingo-final-bounce {
  0%, 54%, 100% { transform: translateY(0) scale(1); }
  64% { transform: translateY(-22px) scale(1.06); }
  76% { transform: translateY(0) scale(0.98); }
  88% { transform: translateY(-10px) scale(1.02); }
}
@keyframes wink-bingo-impact {
  0%, 56%, 100% { opacity: 0; transform: scale(0.52); }
  66% { opacity: 0.95; transform: scale(1.04); }
  78% { opacity: 0.38; transform: scale(1.34); }
}</style><path d="M 260 700 Q 660 220 1020 320 T 1660 620" stroke="hsl(43 94% 60%)" stroke-width="2.4" fill="none" opacity="0.14"/><path d="M 260 700 Q 660 220 1020 320 T 1660 620" stroke="hsl(48 100% 84%)" stroke-width="10" fill="none" opacity="0.06"/><g style="offset-path:path('M 260 700 Q 660 220 1020 320 T 1660 620');animation:wink-trail 3s ease-in-out infinite;animation-delay:0s"><path d="M1.102182119232618e-15,-18 L4.232053816505807,-5.824922359499622 L17.119017293312762,-5.562305898749053 L6.8476069173251055,2.2249223594996215 L10.580134541264517,14.562305898749054 L4.4087284769304716e-16,7.2 L-10.580134541264515,14.562305898749054 L-6.8476069173251055,2.224922359499622 L-17.119017293312766,-5.5623058987490515 L-4.2320538165058075,-5.824922359499621 Z" fill="hsl(43 94% 60%)" stroke="hsl(48 100% 84%)" stroke-width="1.2"/></g><g style="offset-path:path('M 260 700 Q 660 220 1020 320 T 1660 620');animation:wink-trail 3s ease-in-out infinite;animation-delay:0.22s"><path d="M1.3471114790620886e-15,-22 L5.172510220173764,-7.119349550499538 L20.923243358493377,-6.798373876248843 L8.369297343397351,2.7193495504995373 L12.931275550434409,17.798373876248846 L5.388445916248355e-16,8.8 L-12.931275550434407,17.798373876248846 L-8.369297343397351,2.719349550499538 L-20.92324335849338,-6.79837387624884 L-5.172510220173765,-7.119349550499537 Z" fill="hsl(42 100% 70%)" stroke="hsl(48 100% 84%)" stroke-width="1.2"/></g><g style="offset-path:path('M 260 700 Q 660 220 1020 320 T 1660 620');animation:wink-trail 3s ease-in-out infinite;animation-delay:0.44s"><path d="M1.592040838891559e-15,-26 L6.112966623841721,-8.413776741499454 L24.72746942367399,-8.034441853748632 L9.890987769469596,3.213776741499453 L15.282416559604302,21.034441853748632 L6.368163355566237e-16,10.4 L-15.282416559604298,21.034441853748632 L-9.890987769469596,3.213776741499454 L-24.727469423673995,-8.03444185374863 L-6.112966623841722,-8.413776741499452 Z" fill="hsl(48 100% 84%)" stroke="hsl(48 100% 84%)" stroke-width="1.2"/></g><g style="offset-path:path('M 260 700 Q 660 220 1020 320 T 1660 620');animation:wink-trail 3s ease-in-out infinite;animation-delay:0.66s"><path d="M1.102182119232618e-15,-18 L4.232053816505807,-5.824922359499622 L17.119017293312762,-5.562305898749053 L6.8476069173251055,2.2249223594996215 L10.580134541264517,14.562305898749054 L4.4087284769304716e-16,7.2 L-10.580134541264515,14.562305898749054 L-6.8476069173251055,2.224922359499622 L-17.119017293312766,-5.5623058987490515 L-4.2320538165058075,-5.824922359499621 Z" fill="hsl(39 84% 52%)" stroke="hsl(48 100% 84%)" stroke-width="1.2"/></g><g style="offset-path:path('M 260 700 Q 660 220 1020 320 T 1660 620');animation:wink-trail 3s ease-in-out infinite;animation-delay:0.88s"><path d="M1.3471114790620886e-15,-22 L5.172510220173764,-7.119349550499538 L20.923243358493377,-6.798373876248843 L8.369297343397351,2.7193495504995373 L12.931275550434409,17.798373876248846 L5.388445916248355e-16,8.8 L-12.931275550434407,17.798373876248846 L-8.369297343397351,2.719349550499538 L-20.92324335849338,-6.79837387624884 L-5.172510220173765,-7.119349550499537 Z" fill="hsl(50 100% 92%)" stroke="hsl(48 100% 84%)" stroke-width="1.2"/></g><g style="offset-path:path('M 260 700 Q 660 220 1020 320 T 1660 620');animation:wink-trail 3s ease-in-out infinite;animation-delay:1.1s"><path d="M1.592040838891559e-15,-26 L6.112966623841721,-8.413776741499454 L24.72746942367399,-8.034441853748632 L9.890987769469596,3.213776741499453 L15.282416559604302,21.034441853748632 L6.368163355566237e-16,10.4 L-15.282416559604298,21.034441853748632 L-9.890987769469596,3.213776741499454 L-24.727469423673995,-8.03444185374863 L-6.112966623841722,-8.413776741499452 Z" fill="hsl(43 94% 60%)" stroke="hsl(48 100% 84%)" stroke-width="1.2"/></g><g style="offset-path:path('M 260 700 Q 660 220 1020 320 T 1660 620');animation:wink-trail 3s ease-in-out infinite;animation-delay:1.32s"><path d="M1.102182119232618e-15,-18 L4.232053816505807,-5.824922359499622 L17.